<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👹 交点マスター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)']] },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] },
      startup: { typeset: false }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ════ スタート画面 ════ -->
  <div id="screen-start" class="screen active">
    <div class="start-card">
      <div class="app-logo emoji-icon">👹</div>
      <h1 class="app-title">交点マスター</h1>
      <p class="app-subtitle">2直線の交点を求めよう</p>

      <div class="level-select">
        <p class="level-label">レベルをえらぼう</p>
        <div class="level-btns">
          <button class="level-btn active" data-level="1"><b>Lv.1</b><span>整数の傾き</span></button>
          <button class="level-btn" data-level="2"><b>Lv.2</b><span>分数の傾き</span></button>
          <button class="level-btn" data-level="3"><b>Lv.3</b><span>応用</span></button>
        </div>
      </div>

      <div class="highscore-box"><span>👑 最高スコア</span><strong id="high-score">--</strong><span>点</span></div>

      <div class="history-box">
        <div class="history-header"><span>📋 学習履歴</span><button id="reset-btn" class="btn-ghost-sm">リセット</button></div>
        <div id="history-list" class="history-list"><p class="no-history">まだ記録がないよ！</p></div>
      </div>

      <button id="start-btn" class="btn-primary lg">▶ スタート！</button>
    </div>
  </div>

  <!-- ════ クイズ画面 ════ -->
  <div id="screen-quiz" class="screen">
    <header class="quiz-header">
      <button id="quit-btn" class="quit-btn">🏠 中断</button>
      <div class="header-brand"><span class="emoji-icon">👹</span> 交点マスター <span id="level-tag" class="level-tag">Lv.1</span></div>
      <div class="header-progress">
        <span id="q-counter">Q 1 / 5</span>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill" style="width:0%"></div></div>
      </div>
      <div id="score-display" class="header-score">0点</div>
    </header>

    <main class="quiz-main single">
      <section class="center-panel">
        <div class="main-left">
          <div class="question-card">
            <p class="question-label" id="question-label">グラフの2直線の交点の座標を求めなさい</p>
            <div class="graph-wrap">
              <canvas id="graph-canvas" class="graph-canvas"></canvas>
            </div>
            <div class="graph-legend">
              <span class="lg-item"><span class="lg-line lg1"></span>直線①</span>
              <span class="lg-item"><span class="lg-line lg2"></span>直線②</span>
            </div>
            <div id="question-extra" class="question-extra"></div>
          </div>

          <div class="answer-zone">
            <div class="answer-row" id="answer-row"><!-- JSが入力欄を生成 --></div>
            <p class="input-note">※半角で入力してね（分数は <span class="kbd">a/b</span> ボタン）</p>
            <div class="helper-keys">
              <button class="hkey" data-cmd="frac">a/b 分数</button>
              <button class="hkey" data-cmd="minus">−</button>
              <button class="hkey" data-cmd="clear">クリア</button>
            </div>
          </div>

          <div id="feedback-box" class="feedback-box hidden"></div>
        </div>

        <div class="hint-area">
          <button id="hint-btn" class="btn-hint">💡 ヒント</button>
          <div id="hint-text" class="hint-text hidden"></div>
          <div class="memo-area">
            <div class="memo-head"><span class="memo-label">✏️ 計算メモ</span><button id="memo-clear" class="memo-clear" type="button">全消し</button></div>
            <canvas id="memo-canvas" class="memo-canvas"></canvas>
          </div>
        </div>
      </section>
    </main>

    <footer class="quiz-footer">
      <button id="submit-btn" class="btn-primary">✅ 決定！</button>
      <button id="next-btn" class="btn-secondary hidden">次へ →</button>
    </footer>
  </div>

  <!-- ════ 結果画面 ════ -->
  <div id="screen-result" class="screen">
    <div class="result-card">
      <div class="result-header">
        <h2>結果発表！</h2>
        <div id="result-score" class="result-score"></div>
        <div id="result-badge" class="result-badge"></div>
      </div>
      <div class="review-section">
        <h3>振り返り</h3>
        <div id="review-list" class="review-list"></div>
      </div>
      <div class="result-actions">
        <button id="retry-btn" class="btn-primary">🔁 もう一度！</button>
        <button id="review-wrong-btn" class="btn-secondary hidden">❌ まちがいだけ復習</button>
        <button id="home-btn" class="btn-secondary">🏠 ホームへ</button>
      </div>
    </div>
  </div>

  <!-- ════ 確認モーダル ════ -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card" id="modal-card">
      <div class="modal-icon" id="modal-icon">⚠️</div>
      <h2 class="modal-title" id="modal-title">確認</h2>
      <p class="modal-message" id="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="modal-btn modal-btn--cancel">キャンセル</button>
        <button id="modal-ok" class="modal-btn modal-btn--ok">OK</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://unpkg.com/mathlive@0.98.4/dist/mathlive.min.js"></script>
  <script src="questions.js"></script>
  <script src="main.js"></script>
</body>
</html>
